<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>King of Apes - VIP Login</title>
  <link rel="icon" type="image/png" href="/koanft.png" />
  <link href="https://fonts.googleapis.com/css2?family=Chewy&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body, html {
      height: 100%;
      font-family: 'Chewy', cursive;
      background: #000000;
      color: #ffb400;
      overflow: hidden;
    }
    .vip-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    
    /* Ensure AppKit modal appears above everything */
    w3m-modal, appkit-modal, [data-w3m-modal] {
      z-index: 999999 !important;
    }
    
    /* AppKit overlay styling */
    w3m-modal::part(overlay),
    appkit-modal::part(overlay) {
      z-index: 999998 !important;
    }
    
    /* Force AppKit modal visibility */
    w3m-modal[open], appkit-modal[open] {
      display: block !important;
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: 100% !important;
      z-index: 999999 !important;
    }
    
    /* AppKit router container */
    w3m-router-container, appkit-router-container {
      z-index: 999999 !important;
    }
    .vip-modal {
      background: transparent;
      border: none;
      padding: 40px;
      border-radius: 0;
      text-align: center;
      max-width: 600px;
      width: 90%;
      box-shadow: none;
      position: relative;
    }
    .logo-container { margin-bottom: 40px; }
    .koa-logo {
      max-width: 550px;
      height: auto;
      filter: drop-shadow(0 0 20px rgba(255, 180, 0, 0.8));
    }
    .vip-modal h1, .vip-modal h2 {
      color: #ffb400;
      margin-bottom: 20px;
      font-family: 'Chewy', cursive;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
    }
    .vip-modal h1 { font-size: 2em; }
    .vip-modal h2 { font-size: 1.8em; }
    .vip-modal p {
      color: #ffb400;
      margin-bottom: 30px;
      line-height: 1.6;
      font-family: 'Chewy', cursive;
      font-size: 1.1em;
    }
    .vip-button {
      background: linear-gradient(45deg, #ffb400 0%, #ffd700 100%);
      color: #000000;
      border: none;
      padding: 15px 30px;
      border-radius: 15px;
      font-size: 18px;
      font-family: 'Chewy', cursive;
      cursor: pointer;
      transition: all 0.3s ease;
      margin: 10px;
      font-weight: bold;
      box-shadow: 0 4px 15px rgba(255, 180, 0, 0.3);
      display: inline-block;
    }
    .vip-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(255, 180, 0, 0.5);
      background: linear-gradient(45deg, #ffd700 0%, #ffb400 100%);
    }
    .vip-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .disconnect-btn { 
      background: linear-gradient(45deg, #ff4444 0%, #cc3333 100%) !important; 
      color: white !important;
    }
    .disconnect-btn:hover {
      background: linear-gradient(45deg, #cc3333 0%, #ff4444 100%) !important;
    }
    
    #connected-actions, #success-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 15px;
    }
    .error-message {
      color: #ff4444;
      background: rgba(255, 68, 68, 0.1);
      border: 2px solid #ff4444;
      padding: 15px;
      border-radius: 10px;
      margin: 20px 0;
      font-family: 'Chewy', cursive;
    }
    .spinner {
      border: 4px solid rgba(255, 180, 0, 0.2);
      border-top: 4px solid #ffb400;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    .wallet-info {
      color: #ffb400;
      margin-bottom: 20px;
      font-size: 0.9em;
    }
    @keyframes spin { 0%{transform:rotate(0deg);}100%{transform:rotate(360deg);} }
    .hidden { display: none !important; }
    @media (max-width: 768px) {
      .vip-modal { padding: 30px 20px; margin: 20px; }
      .vip-modal h1 { font-size: 1.5em; }
      .vip-modal h2 { font-size: 1.4em; }
      .koa-logo { max-width: 250px; }
      .vip-button { padding: 12px 25px; font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="vip-container">
    <div class="vip-modal">
      <div class="logo-container">
        <img src="koanft.png" alt="King of Apes" class="koa-logo">
      </div>
      <p>You must own a King of Apes NFT to access this exclusive store.</p>
      <div id="wallet-section">
        <button id="connect-wallet-btn" class="vip-button">Connect Wallet</button>
        <div id="wallet-info" class="wallet-info hidden"></div>
        <div id="connected-actions" class="hidden">
          <button id="verify-nft-btn" class="vip-button">Verify NFT Ownership</button>
          <button id="disconnect-btn" class="vip-button disconnect-btn">Disconnect Wallet</button>
        </div>
        <div id="session-actions" class="hidden">
          <p class="wallet-info">You have a valid session</p>
          <button id="enter-store-from-session-btn" class="vip-button">Enter Store</button>
          <button id="clear-session-btn" class="vip-button disconnect-btn">Clear Session</button>
        </div>
      </div>
      <div id="status-section" class="hidden">
        <p id="status-text">Checking NFT ownership...</p>
        <div class="spinner"></div>
      </div>
      <div id="error-section" class="hidden">
        <div id="error-text" class="error-message"></div>
        <button id="retry-btn" class="vip-button">Try Again</button>
      </div>
      <div id="success-section" class="hidden">
  <h2 style="color: white;">WELCOME TO THE CLUB</h2>
  <p style="color: #00ff88; text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);">Access granted!</p>
  <div id="success-actions">
    <button id="enter-store-btn" class="vip-button">Enter Store Now</button>
    <button id="success-disconnect-btn" class="vip-button disconnect-btn">Disconnect & Exit</button>
  </div>
      </div>
    </div>
  </div>

  <!-- Load main.js -->
  <script type="module" src="main.js"></script>
</body>
</html>
