<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-eval' 'unsafe-inline' https: data: blob:;">
    <title>King of Apes - VIP Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Chewy&display=swap" rel="stylesheet">
    
    <!-- Import map to resolve bare module imports -->
    <script type="importmap">
    {
        "imports": {
            "@reown/appkit": "https://esm.sh/@reown/appkit@1.8.1",
            "@reown/appkit/networks": "https://esm.sh/@reown/appkit@1.8.1/networks"
        }
    }
    </script>
    
    <!-- Load AppKit via script tags instead of ES modules -->
    <script src="https://unpkg.com/@reown/appkit@latest/dist/index.umd.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Chewy', cursive;
            background: #000000;
            color: #ffb400;
            overflow: hidden;
        }

        .vip-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99999;
        }

        .vip-modal {
            background: transparent;
            border: none;
            padding: 40px;
            border-radius: 0;
            text-align: center;
            max-width: 600px;
            width: 90%;
            box-shadow: none;
            position: relative;
        }

        .logo-container {
            margin-bottom: 40px;
        }

        .koa-logo {
            max-width: 550px;
            height: auto;
            filter: drop-shadow(0 0 20px rgba(255, 180, 0, 0.8));
        }

        .vip-modal h1 {
            color: #ffb400;
            margin-bottom: 20px;
            font-size: 2em;
            font-family: 'Chewy', cursive;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        .vip-modal h2 {
            color: #ffb400;
            font-size: 1.8em;
            margin-bottom: 20px;
            font-family: 'Chewy', cursive;
            text-shadow: 2px 2px 4px rgba (0, 0, 0, 0.8);
        }

        .vip-modal p {
            color: #ffb400;
            margin-bottom: 30px;
            line-height: 1.6;
            font-family: 'Chewy', cursive;
            font-size: 1.1em;
        }

        .vip-button {
            background: linear-gradient(45deg, #ffb400 0%, #ffd700 100%);
            color: #000000;
            border: none;
            padding: 15px 30px;
            border-radius: 15px;
            font-size: 18px;
            font-family: 'Chewy', cursive;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 180, 0, 0.3);
            display: inline-block;
        }

        .vip-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 180, 0, 0.5);
            background: linear-gradient(45deg, #ffd700 0%, #ffb400 100%);
        }

        .vip-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .disconnect-btn {
            background: #666 !important;
        }

        .error-message {
            color: #ff4444;
            background: rgba(255, 68, 68, 0.1);
            border: 2px solid #ff4444;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            font-family: 'Chewy', cursive;
        }

        .spinner {
            border: 4px solid rgba(255, 180, 0, 0.2);
            border-top: 4px solid #ffb400;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        .wallet-info {
            color: #ffb400;
            margin-bottom: 20px;
            font-size: 0.9em;
        }

        /* Custom styles for AppKit button */
        appkit-button {
            --w3m-color-mix: #ffb400 !important;
            --w3m-accent: #ffb400 !important;
            margin: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .vip-modal {
                padding: 30px 20px;
                margin: 20px;
            }

            .vip-modal h1 {
                font-size: 1.5em;
            }

            .vip-modal h2 {
                font-size: 1.4em;
            }

            .koa-logo {
                max-width: 250px;
            }

            .vip-button {
                padding: 12px 25px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="vip-container">
        <div class="vip-modal">
            <div class="logo-container">
                <img src="koanft.png" alt="King of Apes" class="koa-logo">
            </div>
            
            <p>You must own a King of Apes NFT to access this exclusive store.</p>
            
            <div id="wallet-section">
                <appkit-button></appkit-button>
                <div id="wallet-info" class="wallet-info hidden"></div>
                <button id="disconnect-btn" class="vip-button disconnect-btn hidden">Disconnect & Try Again</button>
            </div>

            <div id="status-section" class="hidden">
                <p id="status-text">Checking NFT ownership...</p>
                <div class="spinner"></div>
            </div>

            <div id="error-section" class="hidden">
                <div id="error-text" class="error-message"></div>
                <button id="retry-btn" class="vip-button">Try Again</button>
            </div>

            <div id="success-section" class="hidden">
                <h2>Welcome, King of Apes holder!</h2>
                <p>Access granted! Redirecting to store...</p>
                <button id="enter-store-btn" class="vip-button">Enter Store Now</button>
            </div>
        </div>
    </div>

    <script>
        // Wait for AppKit to load globally
        window.addEventListener('load', function() {
            console.log('Window loaded, checking for AppKit...');
            console.log('AppKit available:', typeof window.AppKit);
            
            if (typeof window.AppKit !== 'undefined') {
                initializeAppKit();
            } else {
                console.error('AppKit not loaded');
                document.getElementById('error-text').textContent = 'Failed to load wallet connection. Please refresh the page.';
                document.getElementById('error-section').classList.remove('hidden');
            }
        });

                };
